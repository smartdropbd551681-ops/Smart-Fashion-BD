<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order - Smart Fashion BD</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
<h1>🛒 Order Now</h1>

<nav>
<a href="index.html">Home</a>
<a href="products.html">Products</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<section class="hero">

<h2>অর্ডার ফর্ম</h2>

<form>

<label>👤 আপনার নাম</label><br>
<<input type="text" name="name" placeholder="আপনার পুরো নাম" required><br><br>

<label>📱 মোবাইল নম্বর</label><br>
<<input type="tel" name="phone" placeholder="01XXXXXXXXX" required><br><br>

<label>📍 সম্পূর্ণ ঠিকানা</label><br>
<textarea name="address" placeholder="সম্পূর্ণ ঠিকানা (গ্রাম, ডাকঘর, উপজেলা, জেলা)"></textarea)></textarea><br><br>

<label>🛍️ পণ্য নির্বাচন</label><br>
<select name="product">
<option>Men's Fashion</option>
<option>Women's Fashion</option>
<option>Kids Collection</option>
<option>Accessories</option>
</select><br><br>

<label>📏 সাইজ</label><br>
<select>
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
<option>XXL</option>
</select><br><br>

<label>🎨 রঙ</label><br>
<input type="text" placeholder="যেমন: Black"><br><br>

<label>🔢 পরিমাণ</label><br>
<input type="number" value="1" min="1"><br><br>

<label>📝 বিশেষ নির্দেশনা</label><br>
<textarea placeholder="যদি কোনো বিশেষ নির্দেশনা থাকে লিখুন"></textarea><br><br>

<p><strong>🚚 ঢাকা: ৮০ টাকা | ঢাকার বাইরে: ১২০ টাকা</strong></p>

<p><strong>💵 পেমেন্ট: Cash on Delivery</strong></p>

<button class="btn">✅ অর্ডার কনফার্ম করুন</button>

</form>



</section>

<footer class="footer">
© 2026 Smart Fashion BD
</footer>
<script>
document.querySelector("form").addEventListener("submit", function(e) {
    e.preventDefault();

    let name = document.querySelector('input[name="name"]').value;
    let phone = document.querySelector('input[name="phone"]').value;
    let address = document.querySelector('textarea[name="address"]').value;
    let product = document.querySelector('select[name="product"]').value;
    let size = document.querySelector('select[name="size"]').value;
    let color = document.querySelector('input[name="color"]').value;
    let qty = document.querySelector('input[name="quantity"]').value;

    let message =
`🛒 নতুন অর্ডার

👤 নাম: ${name}
📞 মোবাইল: ${phone}
📍 ঠিকানা: ${address}

🛍️ পণ্য: ${product}
📏 সাইজ: ${size}
🎨 রং: ${color}
🔢 পরিমাণ: ${qty}`;

    window.open("https://wa.me/8801864757992?text=" + encodeURIComponent(message), "_blank");
});
  </script>
</body>
                                                      </html>
